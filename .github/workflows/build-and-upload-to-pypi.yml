name: Build and test wheels

on:
  pull_request:
    branches:
      - 'master'
  push:
    branches:
      - 'master'
  release:
    types: [created]
    branches:
      - 'master'
  # Allow a manual run to (re)publish — e.g. to backfill missing
  # wheels/sdist for an already-published version (uses skip-existing).
  workflow_dispatch:

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }} (${{ matrix.cibw_archs }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64 + i686 build natively on the x86 runner.
          - os: ubuntu-latest
            cibw_archs: "auto"
          # Linux aarch64 builds natively on a GitHub ARM64 runner instead of
          # under QEMU emulation on the x86 runner, which took ~90 minutes.
          - os: ubuntu-24.04-arm
            cibw_archs: "aarch64"
          # macOS builds each arch natively so the wheels are tested on the
          # arch they target. Previously a single Intel runner built both and
          # cross-compiled arm64, which produced an untested arm64 wheel.
          - os: macos-15-intel
            cibw_archs: "x86_64"
          - os: macos-15
            cibw_archs: "arm64"
          - os: windows-2022
            cibw_archs: "auto"

    steps:
      - uses: actions/checkout@v3
        with:
           submodules: 'src/ext/uchardet'

      # No QEMU: each Linux arch builds on a matching native runner.
      - name: Build and test wheels
        uses: pypa/cibuildwheel@v2.16.5
        env:
          CIBW_ARCHS: ${{ matrix.cibw_archs }}

      - uses: actions/upload-artifact@v4
        if: (github.event_name == 'release' && github.event.action == 'created') || github.event_name == 'workflow_dispatch'
        with:
          name: cibw-wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  build_sdist:
    name: Build source distribution
    if: (github.event_name == 'release' && github.event.action == 'created') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Checkout submodules
        shell: bash
        run: |
          git submodule sync --recursive
          git submodule update --init --force --recursive --depth=1

      - name: Build sdist
        run: pipx run build --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: cibw-sdist
          path: dist/*.tar.gz

  upload_pypi:
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    # Publish on a release, or on a manual dispatch (e.g. to backfill a version).
    if: (github.event_name == 'release' && github.event.action == 'created') || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: cibw-*
          merge-multiple: true
          path: dist

      # release/v1 tracks the latest v1.x. A recent version is required for
      # skip-existing to correctly recognize PyPI's "file already exists"
      # (HTTP 400) response; the old v1.5.0 errored on it instead of skipping.
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}
          # Idempotent re-runs: don't fail if some files for this version are
          # already on PyPI (lets a re-run backfill missing sdist/wheels).
          skip-existing: true
