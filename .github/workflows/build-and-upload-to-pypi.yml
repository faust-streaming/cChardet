name: Build and test wheels

on:
  pull_request:
    branches:
      - 'master'
  push:
    branches:
      - 'master'
  release:
    types: [created]
    branches:
      - 'master'
  # Allow a manual run to (re)publish — e.g. to backfill missing
  # wheels/sdist for an already-published version (uses skip-existing).
  workflow_dispatch:

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-15-intel, windows-2022]

    steps:
      - uses: actions/checkout@v3
        with:
           submodules: 'src/ext/uchardet'

      - name: Set up QEMU
        if: runner.os == 'Linux'
        uses: docker/setup-qemu-action@v2
        with:
          platforms: all

      - name: Build and test wheels
        uses: pypa/cibuildwheel@v2.16.5
        env:
          CIBW_ARCHS_LINUX: auto aarch64
          CIBW_ARCHS_MACOS: x86_64 arm64

      - uses: actions/upload-artifact@v4
        if: (github.event_name == 'release' && github.event.action == 'created') || github.event_name == 'workflow_dispatch'
        with:
          name: cibw-wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  build_sdist:
    name: Build source distribution
    if: (github.event_name == 'release' && github.event.action == 'created') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Checkout submodules
        shell: bash
        run: |
          git submodule sync --recursive
          git submodule update --init --force --recursive --depth=1

      - name: Build sdist
        run: pipx run build --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: cibw-sdist
          path: dist/*.tar.gz

  upload_pypi:
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    # Publish on a release, or on a manual dispatch (e.g. to backfill a version).
    if: (github.event_name == 'release' && github.event.action == 'created') || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: cibw-*
          merge-multiple: true
          path: dist

      - uses: pypa/gh-action-pypi-publish@v1.5.0
        with:
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}
          # Idempotent re-runs: don't fail if some files for this version are
          # already on PyPI (lets a re-run backfill missing sdist/wheels).
          skip-existing: true
