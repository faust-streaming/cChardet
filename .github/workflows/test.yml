name: Tests

on:
  pull_request:
    branches:
      - 'master'
  push:
    branches:
      - 'master'

jobs:
  test:
    name: Test on Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Python 3.9 was dropped; 3.13 and 3.14 are required to pass.
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']

    steps:
      - uses: actions/checkout@v4
        with:
          # Fetch the vendored uchardet submodule; the meson build needs its
          # C++ sources. (checkout's `submodules` input only accepts
          # true/recursive/false -- a path is treated as false.)
          submodules: recursive

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest
          # Build/install from source (meson-python pulls the build toolchain,
          # including ninja and cython, via build isolation).
          python -m pip install .

      - name: Run tests
        run: python -m pytest src/tests
